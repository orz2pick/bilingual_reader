function splitEn(text) {
    const segments = [];
    let current = '';
    for (let i = 0; i < text.length; i++) {
        current += text[i];
        const ch = text[i];
        const next = text[i + 1];
        const next2 = text[i + 2];

        if (ch === '.' && next === '.' && next2 === '.') {
            current += '..';
            i += 2;
            const after = text[i + 1];
            if (after === ' ' || after === undefined || after === '"') {
                if (after === '"') { current += '"'; i++; }
                segments.push(current.trim());
                current = '';
                if (text[i + 1] === ' ') i++;
                continue;
            }
        }

        if (ch === '.' || ch === '?' || ch === '!') {
            if (next === ' ' || next === undefined || next === '"') {
                const prevWord = current.match(/\b(\w+)\.$/);
                if (ch === '.' && prevWord && ['Mr','Mrs','Ms','Dr','Prof','St','etc'].includes(prevWord[1])) {
                    continue;
                }
                if (next === '"') { current += '"'; i++; }
                segments.push(current.trim());
                current = '';
                if (text[i + 1] === ' ') i++;
                continue;
            }
        }
    }
    if (current.trim()) segments.push(current.trim());
    return segments;
}

function splitZh(text) {
    const segments = [];
    let current = '';
    for (let i = 0; i < text.length; i++) {
        current += text[i];
        if ('\u3002\uff01\uff1f'.includes(text[i])) {
            if (text[i + 1] === '\u201D') { current += '\u201D'; i++; }
            segments.push(current.trim());
            current = '';
            continue;
        }
        if (text[i] === '\u2026' && text[i + 1] === '\u2026') {
            current += '\u2026'; i++;
            segments.push(current.trim());
            current = '';
            continue;
        }
    }
    if (current.trim()) segments.push(current.trim());
    return segments.filter(s => s.length > 0);
}

function highlightVocab(text) {
    const vocabKeys = Object.keys(vocab).sort((a, b) => b.length - a.length);
    let result = text;
    const usedKeys = new Set();
    for (const key of vocabKeys) {
        if (usedKeys.has(key.toLowerCase())) continue;
        const escaped = key.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
        const pattern = new RegExp('\\b' + escaped + '\\b', 'gi');
        if (pattern.test(result)) {
            result = result.replace(pattern, (match) => {
                const lower = match.toLowerCase();
                const vocabKey = Object.keys(vocab).find(k => k.toLowerCase() === lower) || match;
                const tip = vocab[vocabKey] || vocab[match];
                if (!tip) return match;
                return `<span class="vocab">${match}<span class="tooltip">${tip}</span></span>`;
            });
            usedKeys.add(key.toLowerCase());
        }
    }
    return result;
}

        zh: `"我们快开始了。你怎么还没弄好？"她说。我快要哭出来了。"猫……"我只说了这一句。那个身着紫色紧身衣、身体几乎一览无余的美丽身影在我旁边的椅子上坐下。我无言地让她帮我弄脸。她卸掉了小丑妆。我听到她轻声笑了`
    }
];

const enContainer = document.getElementById('en-container');
const zhContainer = document.getElementById('zh-container');

let currentPage = 0;
let globalSentenceId = 0;

data.forEach((item, paraIdx) => {
    if (item.page !== currentPage) {
        currentPage = item.page;
        const enMarker = document.createElement('div');
        enMarker.className = 'page-marker';
        enMarker.textContent = 'Page ' + currentPage;
        enContainer.appendChild(enMarker);

        const zhMarker = document.createElement('div');
        zhMarker.className = 'page-marker';
        zhMarker.textContent = '第 ' + currentPage + ' 页';
        zhContainer.appendChild(zhMarker);
    }

    const enSentences = splitEn(item.en);
    const zhSentences = splitZh(item.zh);
    const minCount = Math.min(enSentences.length, zhSentences.length);

    let enHtml = '';
    let zhHtml = '';

    for (let i = 0; i < minCount; i++) {
        enHtml += `<span class="sentence" data-sid="${globalSentenceId}">${highlightVocab(enSentences[i])}</span> `;
        zhHtml += `<span class="sentence" data-sid="${globalSentenceId}">${zhSentences[i]}</span>`;
        globalSentenceId++;
    }

    if (enSentences.length > minCount) {
        const extra = enSentences.slice(minCount).join(' ');
        enHtml += `<span class="sentence" data-sid="${globalSentenceId - 1}"> ${highlightVocab(extra)}</span>`;
    }
    if (zhSentences.length > minCount) {
        const extra = zhSentences.slice(minCount).join('');
        zhHtml += `<span class="sentence" data-sid="${globalSentenceId - 1}">${extra}</span>`;
    }

    const enPara = document.createElement('div');
    enPara.className = 'paragraph';
    enPara.innerHTML = enHtml.trim();
    enContainer.appendChild(enPara);

    const zhPara = document.createElement('div');
    zhPara.className = 'paragraph';
    zhPara.innerHTML = zhHtml.trim();
    zhContainer.appendChild(zhPara);
});

document.getElementById('font-select').addEventListener('change', function() {
    document.querySelectorAll('.column-left .paragraph').forEach(p => {
        p.style.fontFamily = this.value;
    });
});

document.querySelectorAll('.sentence').forEach(s => {
    s.addEventListener('mouseenter', () => {
        const sid = s.dataset.sid;
        document.querySelectorAll(`.sentence[data-sid="${sid}"]`).forEach(match => {
            match.classList.add('highlight');
        });
    });
    s.addEventListener('mouseleave', () => {
        const sid = s.dataset.sid;
        document.querySelectorAll(`.sentence[data-sid="${sid}"]`).forEach(match => {
            match.classList.remove('highlight');
        });
    });
});
</script>
</body>
</html>
